<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Real-Time Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-primary: #0a0e27;
        --bg-secondary: #151932;
        --bg-widget: rgba(21, 25, 50, 0.8);
        --border-color: rgba(99, 102, 241, 0.2);
        --accent: #6366f1;
        --accent-hover: #818cf8;
        --text-primary: #e5e7eb;
        --text-secondary: #9ca3af;
        --success: #10b981;
        --warning: #f59e0b;
        --danger: #ef4444;
        --glass-bg: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
      }

      [data-theme="light"] {
        --bg-primary: #f3f4f6;
        --bg-secondary: #ffffff;
        --bg-widget: rgba(255, 255, 255, 0.9);
        --border-color: rgba(99, 102, 241, 0.3);
        --text-primary: #1f2937;
        --text-secondary: #6b7280;
        --glass-bg: rgba(0, 0, 0, 0.02);
        --glass-border: rgba(0, 0, 0, 0.1);
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        overflow-x: hidden;
        transition: background 0.3s ease;
      }

      /* Animated Background */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background:
          radial-gradient(
            circle at 20% 50%,
            rgba(99, 102, 241, 0.1) 0%,
            transparent 50%
          ),
          radial-gradient(
            circle at 80% 80%,
            rgba(139, 92, 246, 0.1) 0%,
            transparent 50%
          );
        pointer-events: none;
        z-index: 0;
      }

      .app-container {
        position: relative;
        z-index: 1;
        display: flex;
        height: 100vh;
      }

      /* Sidebar */
      .sidebar {
        width: 280px;
        background: var(--bg-secondary);
        border-right: 1px solid var(--border-color);
        padding: 20px;
        overflow-y: auto;
        transition: transform 0.3s ease;
      }

      .sidebar-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 30px;
      }

      .logo {
        width: 40px;
        height: 40px;
        background: linear-gradient(135deg, var(--accent), #8b5cf6);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
      }

      .sidebar h1 {
        font-size: 18px;
        font-weight: 600;
      }

      .widget-list {
        margin-bottom: 30px;
      }

      .widget-list h3 {
        font-size: 12px;
        text-transform: uppercase;
        color: var(--text-secondary);
        margin-bottom: 15px;
        font-weight: 600;
        letter-spacing: 0.5px;
      }

      .widget-item {
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 10px;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .widget-item:hover {
        background: var(--glass-bg);
        border-color: var(--accent);
        transform: translateX(5px);
      }

      .widget-item-icon {
        width: 32px;
        height: 32px;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
      }

      .settings-section {
        margin-top: 30px;
        padding-top: 20px;
        border-top: 1px solid var(--border-color);
      }

      .setting-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
      }

      .setting-label {
        font-size: 14px;
        color: var(--text-secondary);
      }

      /* Toggle Switch */
      .toggle {
        position: relative;
        width: 48px;
        height: 24px;
        background: var(--glass-bg);
        border-radius: 12px;
        cursor: pointer;
        border: 1px solid var(--glass-border);
        transition: all 0.3s ease;
      }

      .toggle.active {
        background: var(--accent);
      }

      .toggle-slider {
        position: absolute;
        top: 2px;
        left: 2px;
        width: 18px;
        height: 18px;
        background: white;
        border-radius: 50%;
        transition: transform 0.3s ease;
      }

      .toggle.active .toggle-slider {
        transform: translateX(24px);
      }

      .button {
        width: 100%;
        padding: 10px;
        background: var(--accent);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        transition: all 0.2s ease;
        margin-top: 10px;
      }

      .button:hover {
        background: var(--accent-hover);
        transform: translateY(-2px);
      }

      .button.secondary {
        background: var(--glass-bg);
        color: var(--text-primary);
        border: 1px solid var(--glass-border);
      }

      /* Main Content */
      .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Top Bar */
      .top-bar {
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border-color);
        padding: 15px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .top-bar-left {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .status-indicator {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--success);
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .status-dot.offline {
        background: var(--danger);
        animation: none;
      }

      .top-bar-actions {
        display: flex;
        gap: 10px;
      }

      .icon-button {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        background: var(--glass-bg);
        border: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s ease;
        color: var(--text-primary);
      }

      .icon-button:hover {
        background: var(--accent);
        color: white;
        transform: translateY(-2px);
      }

      /* Dashboard Grid */
      .dashboard-grid {
        flex: 1;
        padding: 30px;
        overflow-y: auto;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
        gap: 20px;
        align-content: start;
      }

      /* Widget Card */
      .widget {
        background: var(--bg-widget);
        backdrop-filter: blur(10px);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        padding: 20px;
        position: relative;
        cursor: move;
        transition: all 0.3s ease;
        animation: fadeIn 0.5s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .widget:hover {
        border-color: var(--accent);
        box-shadow: 0 8px 32px rgba(99, 102, 241, 0.2);
      }

      .widget.dragging {
        opacity: 0.5;
        cursor: grabbing;
      }

      .widget.fullscreen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1000;
        border-radius: 0;
        animation: none;
      }

      .widget-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
      }

      .widget-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .widget-icon {
        font-size: 18px;
      }

      .widget-actions {
        display: flex;
        gap: 5px;
      }

      .widget-action {
        width: 24px;
        height: 24px;
        border-radius: 4px;
        background: transparent;
        border: none;
        cursor: pointer;
        color: var(--text-secondary);
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .widget-action:hover {
        background: var(--glass-bg);
        color: var(--text-primary);
      }

      .widget-content {
        min-height: 100px;
      }

      .widget-value {
        font-size: 32px;
        font-weight: 700;
        margin: 10px 0;
        background: linear-gradient(135deg, var(--accent), #8b5cf6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .widget-label {
        font-size: 12px;
        color: var(--text-secondary);
        margin-bottom: 5px;
      }

      .widget-change {
        font-size: 14px;
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }

      .widget-change.positive {
        color: var(--success);
      }

      .widget-change.negative {
        color: var(--danger);
      }

      .sparkline {
        width: 100%;
        height: 40px;
        margin-top: 10px;
      }

      .news-item {
        padding: 12px 0;
        border-bottom: 1px solid var(--border-color);
      }

      .news-item:last-child {
        border-bottom: none;
      }

      .news-title {
        font-size: 14px;
        margin-bottom: 5px;
        color: var(--text-primary);
        line-height: 1.4;
      }

      .news-source {
        font-size: 12px;
        color: var(--text-secondary);
      }

      .chart-container {
        position: relative;
        height: 200px;
        margin-top: 10px;
      }

      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100px;
        color: var(--text-secondary);
      }

      .spinner {
        border: 3px solid var(--glass-border);
        border-top: 3px solid var(--accent);
        border-radius: 50%;
        width: 30px;
        height: 30px;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .error {
        color: var(--danger);
        font-size: 12px;
        padding: 10px;
        background: rgba(239, 68, 68, 0.1);
        border-radius: 8px;
        text-align: center;
      }

      /* Responsive */
      @media (max-width: 768px) {
        .sidebar {
          transform: translateX(-100%);
          position: fixed;
          z-index: 100;
          height: 100vh;
        }

        .sidebar.open {
          transform: translateX(0);
        }

        .dashboard-grid {
          grid-template-columns: 1fr;
          padding: 15px;
        }
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: var(--bg-primary);
      }

      ::-webkit-scrollbar-thumb {
        background: var(--glass-border);
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: var(--accent);
      }

      .last-update {
        font-size: 11px;
        color: var(--text-secondary);
        margin-top: 5px;
      }

      /* Notification */
      .notification {
        position: fixed;
        top: 20px;
        right: 20px;
        background: var(--bg-widget);
        backdrop-filter: blur(10px);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 15px 20px;
        max-width: 350px;
        z-index: 2000;
        animation: slideIn 0.3s ease;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }

      @keyframes slideIn {
        from {
          transform: translateX(400px);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      .notification-title {
        font-weight: 600;
        margin-bottom: 5px;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .notification-message {
        font-size: 13px;
        color: var(--text-secondary);
      }
    </style>
  </head>

    <script>
      // ======================
      // DATA SERVICE (Fixed CORS Issues)
      // ======================
      class DataService {
        constructor() {
          this.cache = new Map();
          this.cacheTimeout = 5 * 60 * 1000; // 5 minutes
        }

        async fetchWithCache(url, key) {
          const cached = this.cache.get(key);
          if (cached && Date.now() - cached.timestamp < this.cacheTimeout) {
            return cached.data;
          }

          try {
            const response = await fetch(url);
            if (!response.ok) throw new Error("Network response was not ok");
            const data = await response.json();
            this.cache.set(key, { data, timestamp: Date.now() });
            return data;
          } catch (error) {
            console.error(`Error fetching ${key}:`, error);
            return cached ? cached.data : null;
          }
        }

        // Using Binance API (CORS friendly)
        async getCryptoPrice(symbol = "bitcoin") {
          try {
            const binanceSymbol = symbol === "bitcoin" ? "BTCUSDT" : "ETHUSDT";
            const response = await fetch(
              `https://api.binance.com/api/v3/ticker/24hr?symbol=${binanceSymbol}`,
            );
            if (!response.ok) throw new Error("Failed to fetch");
            const data = await response.json();
            return {
              label: symbol,
              value: parseFloat(data.lastPrice),
              change: parseFloat(data.priceChangePercent),
              timestamp: Date.now(),
            };
          } catch (error) {
            console.error("Error fetching crypto price:", error);
            return null;
          }
        }

        // Using Binance API for historical data (CORS friendly)
        async getCryptoHistory(symbol = "bitcoin", days = 7) {
          try {
            const binanceSymbol = symbol === "bitcoin" ? "BTCUSDT" : "ETHUSDT";
            const response = await fetch(
              `https://api.binance.com/api/v3/klines?symbol=${binanceSymbol}&interval=1d&limit=${days}`,
            );
            if (!response.ok) throw new Error("Failed to fetch");
            const data = await response.json();
            return data.map((candle) => ({
              timestamp: candle[0],
              value: parseFloat(candle[4]), // Closing price
            }));
          } catch (error) {
            console.error("Error fetching crypto history:", error);
            return [];
          }
        }

        async getWeather(city = "London") {
          const geoData = await this.fetchWithCache(
            `https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1`,
            `geo_${city}`,
          );

          if (!geoData || !geoData.results || geoData.results.length === 0)
            return null;

          const { latitude, longitude, name } = geoData.results[0];
          const weatherData = await this.fetchWithCache(
            `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,wind_speed_10m,weather_code`,
            `weather_${city}`,
          );

          if (!weatherData || !weatherData.current) return null;

          return {
            label: name,
            temperature: weatherData.current.temperature_2m,
            humidity: weatherData.current.relative_humidity_2m,
            windSpeed: weatherData.current.wind_speed_10m,
            weatherCode: weatherData.current.weather_code,
            timestamp: Date.now(),
          };
        }

        async getNews() {
          try {
            const data = await this.fetchWithCache(
              "https://api.rss2json.com/v1/api.json?rss_url=https%3A%2F%2Ftechcrunch.com%2Ffeed%2F",
              "news",
            );

            if (!data || !data.items) return [];

            return data.items.slice(0, 5).map((item) => ({
              title: item.title,
              source: "TechCrunch",
              link: item.link,
              timestamp: new Date(item.pubDate).getTime(),
            }));
          } catch (error) {
            console.error("Error fetching news:", error);
            return [];
          }
        }

        getWeatherEmoji(code) {
          const weatherCodes = {
            0: "☀️",
            1: "🌤️",
            2: "⛅",
            3: "☁️",
            45: "🌫️",
            48: "🌫️",
            51: "🌦️",
            53: "🌦️",
            55: "🌦️",
            61: "🌧️",
            63: "🌧️",
            65: "🌧️",
            71: "🌨️",

            75: "🌨️",

        async getForexRates() {
          try {
            const data = await this.fetchWithCache(
              "https://api.exchangerate-api.com/v4/latest/USD",
              "forex",
            );

            if (!data || !data.rates) return null;

            return {
              eur_usd: 1 / data.rates.EUR,
              gbp_usd: 1 / data.rates.GBP,
              usd_jpy: data.rates.JPY,
              timestamp: Date.now(),
            };
          } catch (error) {
            console.error("Error fetching forex:", error);
            return null;
          }
        }

        // Using CoinGecko but it might still have CORS issues - adding fallback
        async getTopCryptos() {
          try {
            const data = await this.fetchWithCache(
              "https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=5&page=1&sparkline=false&price_change_percentage=24h",
              "top_cryptos",
            );

            if (!data || !Array.isArray(data)) {
              // Fallback to Binance API
              return await this.getTopCryptosFallback();
            }

            return data.map((coin) => ({
              name: coin.name,
              symbol: coin.symbol.toUpperCase(),
              price: coin.current_price,
              change: coin.price_change_percentage_24h || 0,
            }));
          } catch (error) {
            console.error("Error fetching top cryptos from CoinGecko:", error);
            return await this.getTopCryptosFallback();
          }
        }

        async getTopCryptosFallback() {
          try {
            const response = await fetch(
              "https://api.binance.com/api/v3/ticker/24hr",
            );
            if (!response.ok) throw new Error("Failed to fetch");
            const data = await response.json();
            const topCoins = [
              "BTCUSDT",
              "ETHUSDT",
              "BNBUSDT",
              "ADAUSDT",
              "DOGEUSDT",
            ];
            return topCoins.map((symbol) => ({
              name: symbol.replace("USDT", ""),
              symbol: symbol.replace("USDT", ""),
              price: parseFloat(
                data.find((item) => item.symbol === symbol)?.lastPrice || 0,
              ),
              change: parseFloat(
                data.find((item) => item.symbol === symbol)
                  ?.priceChangePercent || 0,
              ),
            }));
          } catch (error) {
            console.error("Error fetching top cryptos fallback:", error);
            return [
              { name: "Bitcoin", symbol: "BTC", price: 43210.5, change: 2.5 },
              { name: "Ethereum", symbol: "ETH", price: 2890.75, change: -1.2 },
              {
                name: "Binance Coin",
                symbol: "BNB",
                price: 312.45,
                change: 0.8,
              },
            ];
          }
        }

        // Using Type.fit API (CORS friendly)
        async getRandomQuote() {
          try {
            const response = await fetch("https://type.fit/api/quotes");
            if (!response.ok) throw new Error("Failed to fetch");
            const quotes = await response.json();
            const randomQuote =
              quotes[Math.floor(Math.random() * quotes.length)];
            return {
              quote: randomQuote.text,
              author: randomQuote.author || "Unknown",
              timestamp: Date.now(),
            };
          } catch (error) {
            console.error("Error fetching quote:", error);
            return {
              quote: "The only way to do great work is to love what you do.",
              author: "Steve Jobs",
              timestamp: Date.now(),
            };
          }
        }

        // Using GitHub API (CORS friendly)
        async getGithubTrending() {
          try {
            const response = await fetch(
              "https://api.github.com/search/repositories?q=stars:>1000&sort=stars&order=desc&per_page=5",
            );
            if (!response.ok) throw new Error("Failed to fetch");
            const data = await response.json();
            return data.items.map((repo) => ({
              name: repo.full_name,
              stars: repo.stargazers_count,
              language: repo.language || "Unknown",
            }));
          } catch (error) {
            console.error("Error fetching GitHub trending:", error);
            return [
              { name: "trending/repo-1", stars: 1234, language: "JavaScript" },
              { name: "awesome/project", stars: 892, language: "Python" },
            ];
          }
        }

      // ======================
      // STORAGE MANAGER
      // ======================
      class StorageManager {
        constructor() {
          this.prefix = "dashboard_";
        }

        save(key, data) {
          try {
            localStorage.setItem(this.prefix + key, JSON.stringify(data));
          } catch (e) {
            console.error("Storage error:", e);
          }
        }

        load(key) {
          try {
            const data = localStorage.getItem(this.prefix + key);
            return data ? JSON.parse(data) : null;
          } catch (e) {
            console.error("Storage error:", e);
            return null;
          }
        }

        remove(key) {
          localStorage.removeItem(this.prefix + key);
        }

        clear() {
          Object.keys(localStorage)
            .filter((key) => key.startsWith(this.prefix))
            .forEach((key) => localStorage.removeItem(key));
        }
      }

      // ======================
      // CHART MANAGER
      // ======================
      class ChartManager {
        constructor() {
          this.charts = new Map();
        }

        createLineChart(canvasId, data, label) {
          const ctx = document.getElementById(canvasId);
          if (!ctx) return null;

          const existingChart = this.charts.get(canvasId);
          if (existingChart) {
            existingChart.destroy();
          }

          const chart = new Chart(ctx, {
            type: "line",
            data: {
              labels: data.map((d) =>
                new Date(d.timestamp).toLocaleDateString(),
              ),
              datasets: [
                {
                  label: label,
                  data: data.map((d) => d.value),
                  borderColor: "#6366f1",
                  backgroundColor: "rgba(99, 102, 241, 0.1)",
                  tension: 0.4,
                  fill: true,
                  pointRadius: 0,
                  borderWidth: 2,
                },
              ],
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: {
                legend: { display: false },
                tooltip: {
                  mode: "index",
                  intersect: false,
                  backgroundColor: "rgba(0, 0, 0, 0.8)",
                  padding: 12,
                  cornerRadius: 8,
                },
              },
              scales: {
                x: {
                  display: false,
                  grid: { display: false },
                },
                y: {
                  display: false,
                  grid: { display: false },
                },
              },
              interaction: {
                mode: "nearest",
                axis: "x",
                intersect: false,
              },
            },
          });

          this.charts.set(canvasId, chart);
          return chart;
        }

        destroyChart(canvasId) {
          const chart = this.charts.get(canvasId);
          if (chart) {
            chart.destroy();
            this.charts.delete(canvasId);
          }
        }
      }

          this.dataService = dataService;

          this.storageManager = storageManager;
          this.widgets = new Map();
          this.widgetCounter = 0;
          this.clockIntervals = new Map(); // Track clock intervals for cleanup
        }

        createWidget(type) {
          const validTypes = [
            "crypto",
            "ethereum",
            "weather",
            "weatherNY",
            "news",
            "chart",
            "clock",
            "forex",
            "cryptoTop",
            "quote",
            "calendar",
            "githubTrending",
          ];
          if (!validTypes.includes(type)) {
            console.error(`Unknown widget type: ${type}`);
            return null;
          }

          const id = `widget_${type}_${this.widgetCounter++}`;
          const widget = {
            id,
            type,
            element: null,
            data: null,
            updateInterval: null,
          };

          this.widgets.set(id, widget);
          this.renderWidget(widget);
          this.updateWidget(widget);

        async updateClockWidget(widget, content) {

          if (this.clockIntervals.has(widget.id)) {
            clearInterval(this.clockIntervals.get(widget.id));

          const updateClock = () => {
            const now = new Date();
            const timeZones = [
              { name: "New York", tz: "America/New_York" },
              { name: "London", tz: "Europe/London" },
              { name: "Tokyo", tz: "Asia/Tokyo" },
            ];

            const clockHTML = timeZones
              .map((zone) => {
                const time = new Date(
                  now.toLocaleString("en-US", { timeZone: zone.tz }),
                );
                const hours = time.getHours().toString().padStart(2, "0");
                const minutes = time.getMinutes().toString().padStart(2, "0");
                const seconds = time.getSeconds().toString().padStart(2, "0");

                return `
                  <div style="margin-bottom: 15px;">
                    <div class="widget-label">${zone.name}</div>
                    <div style="font-size: 24px; font-weight: 600; margin: 5px 0;">${hours}:${minutes}:${seconds}</div>
                  </div>
                `;
              })
              .join("");

            content.innerHTML = clockHTML;
          };

          updateClock();
          const interval = setInterval(updateClock, 1000);
          this.clockIntervals.set(widget.id, interval);
        }

            return;
          }

          widget.data = data;
          content.innerHTML = `
            <div style="padding: 20px 0;">
              <div style="font-size: 18px; font-style: italic; line-height: 1.6; margin-bottom: 15px; color: var(--text-primary);">
                "${data.quote}"
              </div>
              <div class="widget-label" style="text-align: right;">— ${data.author}</div>
            </div>
          `;
        }

        async updateCalendarWidget(widget, content) {
          const now = new Date();
          const year = now.getFullYear();
          const month = now.getMonth();
          const today = now.getDate();

          const monthNames = [
            "January",
            "February",
            "March",
            "April",
            "May",
            "June",
            "July",
            "August",
            "September",
            "October",
            "November",
            "December",
          ];

          const firstDay = new Date(year, month, 1).getDay();
          const daysInMonth = new Date(year, month + 1, 0).getDate();

          let calendarHTML = `
            <div class="widget-label" style="text-align: center; margin-bottom: 15px;">
              ${monthNames[month]} ${year}
            </div>
            <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center;">
          `;

          ["Su", "Mo", "Tu", "We", "Th", "Fr", "Sa"].forEach((day) => {
            calendarHTML += `<div style="font-size: 11px; color: var(--text-secondary); padding: 5px;">${day}</div>`;
          });

          for (let i = 0; i < firstDay; i++) {
            calendarHTML += "<div></div>";
          }

          for (let day = 1; day <= daysInMonth; day++) {
            const isToday = day === today;
            const style = isToday
              ? "background: var(--accent); color: white; border-radius: 50%; font-weight: 600;"
              : "";
            calendarHTML += `<div style="padding: 8px; ${style}">${day}</div>`;
          }

          calendarHTML += "</div>";
          content.innerHTML = calendarHTML;
        }

        async updateGithubWidget(widget, content) {
          const data = await this.dataService.getGithubTrending();
          if (!data || data.length === 0) {
            content.innerHTML =
              '<div class="error">Failed to load GitHub trending</div>';
            return;
          }

          widget.data = data;
          content.innerHTML = data
            .slice(0, 5)
            .map(
              (repo) => `
              <div class="news-item">
                <div class="news-title">${repo.name}</div>
                <div class="news-source">⭐ ${repo.stars} stars • ${
                  repo.language || "Unknown"
                }</div>
              </div>
            `,
            )
            .join("");
        }

        removeWidget(id) {
          const widget = this.widgets.get(id);
          if (!widget) return;

          // Clean up clock interval if exists
          if (this.clockIntervals.has(id)) {
            clearInterval(this.clockIntervals.get(id));
            this.clockIntervals.delete(id);
          }

          this.chartManager.destroyChart(`${id}_chart`);

          if (widget.element) {
            widget.element.remove();
          }

          this.widgets.delete(id);
          this.saveLayout();
        }

        toggleFullscreen(id) {
          const widget = this.widgets.get(id);
          if (!widget || !widget.element) return;

          widget.element.classList.toggle("fullscreen");
        }

        saveLayout() {
          const validTypes = [
            "crypto",
            "ethereum",
            "weather",
            "weatherNY",
            "news",
            "chart",
            "clock",
            "forex",
            "cryptoTop",
            "quote",
            "calendar",
            "githubTrending",
          ];
          const layout = Array.from(this.widgets.values())
            .filter((w) => validTypes.includes(w.type))
            .map((w) => ({
              type: w.type,
            }));
          this.storageManager.save("layout", layout);
        }

        loadLayout() {
          const layout = this.storageManager.load("layout");
          if (!layout || !Array.isArray(layout)) return;

          const validTypes = [
            "crypto",
            "ethereum",
            "weather",
            "weatherNY",
            "news",
            "chart",
            "clock",
            "forex",
            "cryptoTop",
            "quote",
            "calendar",
            "githubTrending",
          ];
          layout.forEach((item) => {
            if (item && item.type && validTypes.includes(item.type)) {
              this.createWidget(item.type);
            }
          });
        }
      }

      // ======================
      // MAIN APPLICATION
      // ======================
      class Dashboard {
        constructor() {
          this.dataService = new DataService();
          this.storageManager = new StorageManager();
          this.chartManager = new ChartManager();
          this.widgetManager = new WidgetManager(
            this.dataService,
            this.chartManager,
            this.storageManager,
          );

          this.autoRefresh = true;
          this.refreshRate = 10000;
          this.refreshInterval = null;
          this.isOnline = true;

          this.init();
        }

        init() {
          this.loadSettings();
          this.setupDragDrop();
          this.startAutoRefresh();
          this.loadOrCreateDefaultLayout();
          this.checkOnlineStatus();
          this.updateStatus();
        }

        loadSettings() {
          const settings = this.storageManager.load("settings") || {};
          this.autoRefresh = settings.autoRefresh !== false;
          this.refreshRate = settings.refreshRate || 10000;

          const isDark = settings.theme === "dark";
          document.documentElement.setAttribute(
            "data-theme",
            isDark ? "dark" : "light",
          );
          document
            .getElementById("themeToggle")
            .classList.toggle("active", isDark);
          document
            .getElementById("autoRefreshToggle")
            .classList.toggle("active", this.autoRefresh);
          document.getElementById("refreshRate").value = this.refreshRate;
        }

        loadOrCreateDefaultLayout() {
          const layout = this.storageManager.load("layout");
          const validTypes = [
            "crypto",
            "ethereum",
            "weather",
            "weatherNY",
            "news",
            "chart",
            "clock",
            "forex",
            "cryptoTop",
            "quote",
            "calendar",
            "githubTrending",
          ];

          if (layout && Array.isArray(layout) && layout.length > 0) {
            const validLayout = layout.filter(
              (item) => item && item.type && validTypes.includes(item.type),
            );

            if (validLayout.length > 0) {
              validLayout.forEach((item) => {
                this.addWidget(item.type);
              });
              return;
            }
          }

          this.addWidget("crypto");
          this.addWidget("ethereum");
          this.addWidget("weather");
          this.addWidget("chart");
        }

        setupDragDrop() {
          const grid = document.getElementById("dashboardGrid");

          grid.addEventListener("dragover", (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = "move";
          });

          grid.addEventListener("drop", (e) => {
            e.preventDefault();
            const widgetId = e.dataTransfer.getData("text/html");
            const widget = document.getElementById(widgetId);

            if (widget) {
              const afterElement = this.getDragAfterElement(grid, e.clientY);
              if (afterElement == null) {
                grid.appendChild(widget);
              } else {
                grid.insertBefore(widget, afterElement);
              }
              this.widgetManager.saveLayout();
            }
          });
        }

        getDragAfterElement(container, y) {
          const draggableElements = [
            ...container.querySelectorAll(".widget:not(.dragging)"),
          ];

          return draggableElements.reduce(
            (closest, child) => {
              const box = child.getBoundingClientRect();
              const offset = y - box.top - box.height / 2;

              if (offset < 0 && offset > closest.offset) {
                return { offset: offset, element: child };
              } else {
                return closest;
              }
            },
            { offset: Number.NEGATIVE_INFINITY },
          ).element;
        }

        addWidget(type) {
          this.widgetManager.createWidget(type);
          this.widgetManager.saveLayout();
        }

        async refreshAll() {
          const widgets = Array.from(this.widgetManager.widgets.values());

          for (const widget of widgets) {
            await this.widgetManager.updateWidget(widget);
          }

          this.updateLastUpdate();
          this.showNotification(
            "Dashboard Refreshed",
            "All widgets updated successfully",
          );
        }

        startAutoRefresh() {
          if (this.refreshInterval) {
            clearInterval(this.refreshInterval);
          }

          if (this.autoRefresh) {
            this.refreshInterval = setInterval(() => {
              this.refreshAll();
            }, this.refreshRate);
          }
        }

        toggleAutoRefresh() {
          this.autoRefresh = !this.autoRefresh;
          document
            .getElementById("autoRefreshToggle")
            .classList.toggle("active", this.autoRefresh);
          this.saveSettings();
          this.startAutoRefresh();
        }

        updateRefreshRate(value) {
          this.refreshRate = parseInt(value);
          this.saveSettings();
          this.startAutoRefresh();
        }

        toggleTheme() {
          const toggle = document.getElementById("themeToggle");
          toggle.classList.toggle("active");
          const isDark = toggle.classList.contains("active");
          document.documentElement.setAttribute(
            "data-theme",
            isDark ? "dark" : "light",
          );
          this.saveSettings();
        }

        saveSettings() {
          const isDark = document
            .getElementById("themeToggle")
            .classList.contains("active");
          this.storageManager.save("settings", {
            theme: isDark ? "dark" : "light",
            autoRefresh: this.autoRefresh,
            refreshRate: this.refreshRate,
          });
        }

        exportLayout() {
          const layout = this.storageManager.load("layout") || [];
          const settings = this.storageManager.load("settings") || {};
          const exportData = { layout, settings };
          const dataStr = JSON.stringify(exportData, null, 2);
          const dataBlob = new Blob([dataStr], { type: "application/json" });
          const url = URL.createObjectURL(dataBlob);
          const link = document.createElement("a");
          link.href = url;
          link.download = "dashboard-layout.json";
          link.click();
          URL.revokeObjectURL(url);
          this.showNotification(
            "Export Complete",
            "Layout downloaded successfully",
          );
        }

        importLayout() {
          const input = document.createElement("input");
          input.type = "file";
          input.accept = "application/json";
          input.onchange = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
              try {
                const data = JSON.parse(event.target.result);
                if (data.layout) {
                  this.storageManager.save("layout", data.layout);
                }
                if (data.settings) {
                  this.storageManager.save("settings", data.settings);
                }
                location.reload();
              } catch (error) {
                this.showNotification(
                  "Import Failed",
                  "Invalid layout file",
                  "error",
                );
              }
            };
            reader.readAsText(file);
          };
          input.click();
        }

        resetDashboard() {
          if (
            confirm(
              "Are you sure you want to reset the dashboard? This will clear all widgets and settings.",
            )
          ) {
            this.storageManager.clear();
            location.reload();
          }
        }

        toggleSidebar() {
          document.getElementById("sidebar").classList.toggle("open");
        }

        checkOnlineStatus() {
          window.addEventListener("online", () => {
            this.isOnline = true;
            this.updateStatus();
            this.showNotification("Back Online", "Connection restored");
          });

          window.addEventListener("offline", () => {
            this.isOnline = false;
            this.updateStatus();
            this.showNotification(
              "Offline",
              "No internet connection",
              "warning",
            );
          });
        }

        updateStatus() {
          const dot = document.getElementById("statusDot");
          const text = document.getElementById("statusText");

          if (this.isOnline) {
            dot.classList.remove("offline");
            text.textContent = "Live";
          } else {
            dot.classList.add("offline");
            text.textContent = "Offline";
          }
        }

        updateLastUpdate() {
          const now = new Date();
          document.getElementById("lastUpdate").textContent =
            `Last updated: ${now.toLocaleTimeString()}`;
        }

        showNotification(title, message, type = "success") {
          const notification = document.createElement("div");
          notification.className = "notification";

          const icon =
            type === "error" ? "❌" : type === "warning" ? "⚠️" : "✅";

          notification.innerHTML = `
            <div class="notification-title">${icon} ${title}</div>
            <div class="notification-message">${message}</div>
          `;

          document.body.appendChild(notification);

          setTimeout(() => {
            notification.style.animation = "slideIn 0.3s ease reverse";
            setTimeout(() => notification.remove(), 300);
          }, 3000);
        }
      }

      // Initialize app
      const app = new Dashboard();
    </script>
  </body>
</html>
